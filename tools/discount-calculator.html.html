<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>கடை தள்ளுபடி கணக்கிடுவான் | Discount Calculator Tamil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
    <div class="max-w-xl mx-auto px-4 py-10">
        <a href="/" class="text-sm text-pink-700 hover:underline">&larr; முகப்பிற்குச் செல்ல</a>
        <h1 class="text-2xl font-bold text-stone-900 mt-4 mb-4">🛍️ கடை தள்ளுபடி கணக்கிடுவான்</h1>
        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm space-y-4">
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">அசல் விலை (Original Price ₹):</label>
                <input type="number" id="price" value="2000" class="w-full p-3 border border-stone-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">தள்ளுபடி சதவீதம் (Discount %):</label>
                <input type="number" id="disc" value="20" class="w-full p-3 border border-stone-300 rounded-lg">
            </div>
            <button onclick="calcDiscount()" class="w-full bg-pink-700 text-white font-bold py-3 rounded-lg">கணக்கிடு</button>
            <div class="p-4 bg-stone-900 text-stone-100 rounded-xl text-center text-sm">
                நீங்கள் சேமிக்கும் தொகை: <span class="text-green-400 font-bold">₹<span id="saved">0</span></span><br>
                இறுதி விற்பனை விலை: <span class="text-pink-400 font-bold text-lg">₹<span id="final">0</span></span>
            </div>
        </div>
    </div>
    <script>
        function calcDiscount() {
            const p = parseFloat(document.getElementById('price').value)||0;
            const d = parseFloat(document.getElementById('disc').value)||0;
            const saved = p * (d / 100);
            document.getElementById('saved').innerText = saved.toFixed(2);
            document.getElementById('final').innerText = (p - saved).toFixed(2);
        }
        calcDiscount();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>அலகு மாற்றி | General Unit Converter Tamil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <a href="/" class="text-sm text-teal-700 hover:underline">&larr; முகப்பிற்குச் செல்ல</a>
        <h1 class="text-3xl font-bold text-stone-900 mt-4 mb-2">📐 பொது அலகு மாற்றி (Kilometers to Miles)</h1>
        
        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm space-y-4">
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">கிமீ அளவு (Enter Kilometers):</label>
                <input type="number" id="km-input" value="1" oninput="convertUnit()" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-teal-600">
            </div>
            <div class="p-5 bg-stone-900 text-stone-100 rounded-xl space-y-2 text-sm">
                <div class="flex justify-between"><span>மைல்கள் (Miles):</span> <span class="font-bold text-teal-400" id="out-miles">0</span></div>
                <div class="flex justify-between"><span>மீட்டர்கள் (Meters):</span> <span class="font-bold text-teal-400" id="out-meters">0</span></div>
                <div class="flex justify-between"><span>அடிகள் (Feet):</span> <span class="font-bold text-teal-400" id="out-feet">0</span></div>
            </div>
        </div>
    </div>
    <script>
        function convertUnit() {
            const km = parseFloat(document.getElementById('km-input').value) || 0;
            document.getElementById('out-miles').innerText = (km * 0.621371).toFixed(3);
            document.getElementById('out-meters').innerText = (km * 1000).toFixed(0);
            document.getElementById('out-feet').innerText = (km * 3280.84).toFixed(1);
        }
        convertUnit();
    </script>
</body>
</html>

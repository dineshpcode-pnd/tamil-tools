<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP மியூச்சுவல் ஃபண்ட் கணக்கிடுவான் | SIP Calculator Tamil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <a href="/" class="text-sm text-indigo-700 hover:underline">&larr; முகப்பிற்குச் செல்ல</a>
        <h1 class="text-3xl font-bold text-stone-900 mt-4 mb-2">📈 SIP சேமிப்பு கணக்கிடுவான்</h1>
        <p class="text-stone-600 mb-6 text-sm">மாதாந்திர முதலீடு, வட்டி விகிதம் மற்றும் கால அளவை உள்ளிட்டு எதிர்கால முதிர்வுத் தொகையைக் கணக்கிடுங்கள்.</p>

        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm space-y-4">
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">மாதாந்திர முதலீடு (Monthly SIP Amount ₹):</label>
                <input type="number" id="sip-amount" value="5000" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-indigo-600">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">எதிர்பார்க்கும் வட்டி (% Per Year):</label>
                    <input type="number" id="sip-rate" value="12" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">கால அளவு (வருடங்கள் - Years):</label>
                    <input type="number" id="sip-years" value="10" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-indigo-600">
                </div>
            </div>

            <button onclick="calcSIP()" class="w-full bg-indigo-700 text-white font-bold py-3 rounded-lg hover:bg-indigo-800 transition">முதிர்வுத் தொகையைக் கணக்கிடு</button>

            <div class="mt-6 p-5 bg-stone-900 text-stone-100 rounded-xl space-y-2 text-sm">
                <div class="flex justify-between border-b border-stone-700 pb-2">
                    <span>மொத்த முதலீட்டுத் தொகை:</span> <span>₹<span id="res-sip-invested">0.00</span></span>
                </div>
                <div class="flex justify-between border-b border-stone-700 pb-2">
                    <span>மதிப்பிடப்பட்ட வட்டி லாபம்:</span> <span>₹<span id="res-sip-gain">0.00</span></span>
                </div>
                <div class="flex justify-between text-lg font-bold text-indigo-400 pt-2">
                    <span>மொத்த முதிர்வுத் தொகை:</span> <span>₹<span id="res-sip-total">0.00</span></span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calcSIP() {
            const p = parseFloat(document.getElementById('sip-amount').value) || 0;
            const annualRate = parseFloat(document.getElementById('sip-rate').value) || 0;
            const years = parseFloat(document.getElementById('sip-years').value) || 0;

            const i = (annualRate / 12) / 100;
            const n = years * 12;

            if (p === 0 || i === 0 || n === 0) return;

            const totalValue = p * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
            const invested = p * n;
            const gains = totalValue - invested;

            document.getElementById('res-sip-invested').innerText = invested.toLocaleString('en-IN', {maximumFractionDigits: 0});
            document.getElementById('res-sip-gain').innerText = gains.toLocaleString('en-IN', {maximumFractionDigits: 0});
            document.getElementById('res-sip-total').innerText = totalValue.toLocaleString('en-IN', {maximumFractionDigits: 0});
        }
        calcSIP();
    </script>
</body>
</html>

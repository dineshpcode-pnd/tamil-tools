<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>தண்ணீர் நுகர்வு கணிப்பான் | Daily Water Intake Calculator Tamil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
    <div class="max-w-xl mx-auto px-4 py-10">
        <a href="/" class="text-sm text-blue-700 hover:underline">&larr; முகப்பிற்குச் செல்ல</a>
        <h1 class="text-2xl font-bold text-stone-900 mt-4 mb-4">💧 தினசரி தண்ணீர் தேவைக் கணிப்பான்</h1>
        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm space-y-4">
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">உங்கள் உடல் எடை (Weight in KG):</label>
                <input type="number" id="weight-water" value="70" oninput="calcWater()" class="w-full p-3 border border-stone-300 rounded-lg">
            </div>
            <div class="p-5 bg-stone-900 text-stone-100 rounded-xl text-center">
                <span class="text-xs text-stone-400 block">நீங்கள் குடிக்க வேண்டிய அளவு</span>
                <span class="text-3xl font-black text-blue-400"><span id="water-res">0.0</span> Liters / நாள்</span>
            </div>
        </div>
    </div>
    <script>
        function calcWater() {
            const w = parseFloat(document.getElementById('weight-water').value)||0;
            document.getElementById('water-res').innerText = (w * 0.033).toFixed(1);
        }
        calcWater();
    </script>
</body>
</html>

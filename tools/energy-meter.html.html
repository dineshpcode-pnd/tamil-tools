<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>மின்சாரக் கட்டணக் கணக்கிடுவான் (KWH) | தமிழ்த்தொழில்</title>
    <meta name="description" content="உங்கள் வீட்டு மின் சாதனங்களின் மின் நுகர்வு மற்றும் தோராயமான கட்டணத்தைக் கணக்கிடுங்கள்.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <a href="/" class="text-sm text-blue-700 hover:underline">&larr; முகப்பிற்குச் செல்ல</a>
        <h1 class="text-3xl font-bold text-stone-900 mt-4 mb-2">⚡ மின் நுகர்வு & கட்டணக் கணக்கிடுவான்</h1>
        <p class="text-stone-600 mb-6 text-sm">சாதனத்தின் வாட்ஸ் அளவு மற்றும் பயன்படுத்தும் நேரத்தைக் கொண்டு மின் கட்டணத்தைக் கணக்கிடுங்கள்.</p>

        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm space-y-4">
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">மின் சாதனத்தின் திறன் (Watts):</label>
                <input type="number" id="watts" value="1000" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-blue-600">
            </div>
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">ஒரு நாளைக்கு பயன்படுத்தும் நேரம் (Hours/Day):</label>
                <input type="number" id="hours" value="5" max="24" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-blue-600">
            </div>
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">ஒரு யூனிட் மின்சாரக் கட்டணம் (₹ Per Unit):</label>
                <input type="number" id="unit-cost" value="6" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-blue-600">
            </div>

            <button onclick="calcEnergy()" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition">கணக்கிடு</button>

            <div class="mt-6 p-5 bg-stone-900 text-stone-100 rounded-xl grid grid-cols-2 gap-4 text-center">
                <div class="border-r border-stone-700 p-2">
                    <span class="text-xs text-stone-400 block">மாதாந்திர மின் நுகர்வு</span>
                    <span class="text-xl font-bold text-blue-400"><span id="res-units">0</span> KWH (Units)</span>
                </div>
                <div class="p-2">
                    <span class="text-xs text-stone-400 block">தோராயமான மாதக் கட்டணம்</span>
                    <span class="text-xl font-bold text-green-400">₹<span id="res-cost">0.00</span></span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calcEnergy() {
            const watts = parseFloat(document.getElementById('watts').value) || 0;
            const hours = parseFloat(document.getElementById('hours').value) || 0;
            const cost = parseFloat(document.getElementById('unit-cost').value) || 0;

            const dailyUnits = (watts * hours) / 1000;
            const monthlyUnits = dailyUnits * 30;
            const monthlyCost = monthlyUnits * cost;

            document.getElementById('res-units').innerText = monthlyUnits.toFixed(1);
            document.getElementById('res-cost').innerText = monthlyCost.toFixed(2);
        }
        calcEnergy();
    </script>
</body>
</html>

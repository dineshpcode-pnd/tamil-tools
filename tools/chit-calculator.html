<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ஏலச்சீட்டு லாபக் கணக்கிடுவான் | Chit Fund Calculator Tamil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <a href="/" class="text-sm text-amber-700 hover:underline">&larr; முகப்பிற்குச் செல்ல</a>
        <h1 class="text-3xl font-bold text-stone-900 mt-4 mb-2">🎟️ ஏலச்சீட்டு லாபக் கணக்கிடுவான்</h1>
        <p class="text-stone-600 mb-6 text-sm">சீட்டுத் தொகை, தள்ளுபடி மற்றும் நபர்களின் எண்ணிக்கையைக் கொண்டு தள்ளுபடி லாபம் (Dividend) மற்றும் செலுத்த வேண்டிய தொகையைக் கணக்கிடுங்கள்.</p>

        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">மொத்தச் சீட்டுத் தொகை (₹):</label>
                    <input type="number" id="chit-total" value="100000" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-amber-600">
                </div>
                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">மொத்த உறுப்பினர்கள்:</label>
                    <input type="number" id="chit-members" value="20" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-amber-600">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">இந்த மாத ஏலத் தள்ளுபடித் தொகை (Auction Discount ₹):</label>
                <input type="number" id="chit-discount" value="15000" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-amber-600">
            </div>

            <button onclick="calcChit()" class="w-full bg-amber-700 text-white font-bold py-3 rounded-lg hover:bg-amber-800 transition">கணக்கிடு</button>

            <div class="mt-6 p-5 bg-stone-900 text-stone-100 rounded-xl space-y-2 text-sm">
                <div class="flex justify-between border-b border-stone-700 pb-2">
                    <span>ஒரு நபருக்கான தள்ளுபடி லாபம் (Dividend):</span> <span class="text-amber-400 font-bold">₹<span id="res-dividend">0.00</span></span>
                </div>
                <div class="flex justify-between pt-2 text-base font-bold">
                    <span>இந்த மாதம் செலுத்த வேண்டிய தொகை:</span> <span class="text-green-400">₹<span id="res-pay">0.00</span></span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calcChit() {
            const total = parseFloat(document.getElementById('chit-total').value) || 0;
            const members = parseFloat(document.getElementById('chit-members').value) || 1;
            const discount = parseFloat(document.getElementById('chit-discount').value) || 0;

            const dividend = discount / members;
            const monthlyBase = total / members;
            const actualPay = monthlyBase - dividend;

            document.getElementById('res-dividend').innerText = dividend.toFixed(2);
            document.getElementById('res-pay').innerText = actualPay.toFixed(2);
        }
        calcChit();
    </script>
</body>
</html>

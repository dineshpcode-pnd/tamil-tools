<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>கூட்டு வட்டி கணக்கிடுவான் | Compound Interest Calculator Tamil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
    <div class="max-w-xl mx-auto px-4 py-10">
        <a href="/" class="text-sm text-sky-700 hover:underline">&larr; முகப்பிற்குச் செல்ல</a>
        <h1 class="text-2xl font-bold text-stone-900 mt-4 mb-4">💵 கூட்டு வட்டி கணக்கிடுவான்</h1>
        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm space-y-4">
            <div>
                <label class="block text-sm font-bold text-stone-700 mb-2">அசல் தொகை (Principal ₹):</label>
                <input type="number" id="ci-p" value="50000" class="w-full p-3 border border-stone-300 rounded-lg">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">ஆண்டு வட்டி (%):</label>
                    <input type="number" id="ci-r" value="10" class="w-full p-3 border border-stone-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">ஆண்டுகள் (Years):</label>
                    <input type="number" id="ci-t" value="3" class="w-full p-3 border border-stone-300 rounded-lg">
                </div>
            </div>
            <button onclick="calcCI()" class="w-full bg-sky-700 text-white font-bold py-3 rounded-lg">வட்டி கணக்கிடு</button>
            <div class="p-4 bg-stone-900 text-stone-100 rounded-xl text-center text-sm">
                மொத்த வட்டி: <span class="text-sky-400 font-bold">₹<span id="ci-interest">0</span></span><br>
                மொத்தத் தொகை: <span class="text-green-400 font-bold text-lg">₹<span id="ci-total">0</span></span>
            </div>
        </div>
    </div>
    <script>
        function calcCI() {
            const p = parseFloat(document.getElementById('ci-p').value)||0;
            const r = parseFloat(document.getElementById('ci-r').value)||0;
            const t = parseFloat(document.getElementById('ci-t').value)||0;
            const total = p * Math.pow((1 + (r/100)), t);
            document.getElementById('ci-total').innerText = total.toFixed(2);
            document.getElementById('ci-interest').innerText = (total - p).toFixed(2);
        }
        calcCI();
    </script>
</body>
</html>
